name: ci-pipeline
run-name: ${{ github.actor }} is running the CI pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  built-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo fmt --all --check
      - run: cargo build
      - run: cargo test
